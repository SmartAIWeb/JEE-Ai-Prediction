services:
  web-app:
    image: tomcat:10.1-jdk21
    container_name: jee-tomcat
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - backend
    volumes:
      - ./web-app/target/predictionApp.war:/usr/local/tomcat/webapps/ROOT.war
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: prediction_app_db
      DB_USER: root
      DB_PASSWORD: root
      ML_API_URL: http://ml-api:5000/predict
    depends_on:
      - db
      - ml-api

  db:
    image: mariadb:11
    container_name: jee-db
    restart: unless-stopped
    volumes:
      - db-data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: prediction_app_db
    networks:
      - backend

  ml-api:
    build:
      context: ./ml-api
      dockerfile: Dockerfile
    container_name: jee-ml
    restart: unless-stopped
    volumes:
      - ./ml-api/api:/app:z
      - ./ml-api/models:/app/models:z
    ports:
      - "5000:5000"
    networks:
      - backend
    depends_on:
      - db

volumes:
  db-data:

networks:
  backend:
    driver: bridge
